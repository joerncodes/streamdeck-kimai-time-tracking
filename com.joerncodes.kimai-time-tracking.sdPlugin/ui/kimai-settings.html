<!DOCTYPE html>
<html>

<head lang="en">
    <title>Kimai Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Kimai URL">
        <sdpi-textfield setting="kimaiUrl" placeholder="https://kimai.example.com" global required></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="API Token">
        <sdpi-password setting="apiToken" placeholder="Your Kimai API token" global required></sdpi-password>
    </sdpi-item>
</body>

</html>
